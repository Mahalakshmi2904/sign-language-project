<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Language to Text</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.12);
      padding: 40px 50px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    button {
      padding: 14px 30px;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: #00e6b8;
      color: #333;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .note {
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.85;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sign Language to Text</h1>
    <p>Click the button below to activate the camera for gesture detection.</p>

<a href="/start-camera" target="_blank">
  <button>🎥 Start Camera</button>
</a>

    <div class="note">
      Press <strong>Q</strong> in the camera window to stop.
    </div>
  </div>

  
</body>
</html>
